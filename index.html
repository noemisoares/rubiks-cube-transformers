<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autobots Rubik — Transformers Cube</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000000;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px 28px;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
        z-index: 10;
      }
      #titulo {
        color: #e8a020;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow:
          0 0 18px #e8a02088,
          0 0 40px #e8a02044;
      }
      #subtitulo {
        color: #4fc3f7;
        font-size: 11px;
        letter-spacing: 2px;
        margin-top: 4px;
        opacity: 0.8;
      }
      #painelDireita {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 12px;
      }
      #contadorMovimentos {
        min-width: 160px;
        padding: 14px 16px;
        position: relative;
        overflow: hidden;
        border-radius: 18px;
        text-align: right;
        background:
          linear-gradient(135deg, rgba(10, 16, 28, 0.96), rgba(18, 28, 44, 0.8)),
          radial-gradient(circle at top left, rgba(232, 160, 32, 0.2), transparent 35%);
        border: 1px solid rgba(232, 160, 32, 0.35);
        box-shadow:
          0 0 0 1px rgba(79, 195, 247, 0.12),
          0 0 28px rgba(232, 160, 32, 0.16),
          0 18px 40px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(12px);
      }
      #contadorMovimentos::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.06), transparent);
        transform: translateX(-100%);
        animation: shimmer 4s linear infinite;
      }
      #contadorMovimentos::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 10px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(79, 195, 247, 0.8), transparent);
      }
      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }
      #rotuloContador {
        position: relative;
        z-index: 1;
        color: #bfeaff;
        font-size: 9px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 6px;
        font-weight: 800;
      }
      #valorMovimentos {
        position: relative;
        z-index: 1;
        color: #ffe1a6;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 1.5px;
        line-height: 1;
        text-shadow:
          0 0 12px rgba(232, 160, 32, 0.55),
          0 0 28px rgba(79, 195, 247, 0.2);
      }
      #instrucoes {
        color: #aaa;
        font-size: 11px;
        text-align: right;
        line-height: 1.9;
        letter-spacing: 1px;
      }
      #instrucoes span {
        color: #e8a020;
      }
      #hud::after {
        content: "";
        position: fixed;
        bottom: 20px;
        left: 28px;
        width: 120px;
        height: 2px;
        background: linear-gradient(90deg, #e8a020, transparent);
      }
      #telaVitoria {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 30px;
        backdrop-filter: blur(5px);
      }
      #telaVitoria.ativa {
        display: flex;
        animation: aparecer 0.5s ease-out;
      }
      @keyframes aparecer {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      #mensagemVitoria {
        color: #e8a020;
        font-size: 72px;
        font-weight: bold;
        letter-spacing: 4px;
        text-transform: uppercase;
        text-shadow:
          0 0 20px #e8a020aa,
          0 0 50px #e8a02066;
        text-align: center;
      }
      #detalhesVitoria {
        color: #4fc3f7;
        font-size: 18px;
        letter-spacing: 2px;
        text-align: center;
        line-height: 2;
      }
      #botoesVitoria {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }
      .botao {
        padding: 12px 30px;
        background: #e8a020;
        color: #000;
        border: none;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 2px;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.3s;
        box-shadow: 0 0 15px #e8a02088;
      }
      .botao:hover {
        background: #ffb84d;
        box-shadow: 0 0 30px #ffb84daa;
        transform: scale(1.05);
      }
      #iconeVitoria {
      width: 150px; 
      height: auto;
      margin-bottom: -10px;
      filter: drop-shadow(0 0 15px rgba(232, 160, 32, 0.8));
      animation: pulsar 2s infinite alternate; 
    }

    @keyframes pulsar {
      from { filter: drop-shadow(0 0 10px rgba(232, 160, 32, 0.5)); }
      to { filter: drop-shadow(0 0 25px rgba(232, 160, 32, 1)); transform: scale(1.05); }
    }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
  </head>

  <body>
    <div id="hud">
      <div>
        <div id="titulo">Autobots Rubik</div>
        <div id="subtitulo">TRANSFORMERS EDITION — THREE.JS</div>
      </div>
      <div id="painelDireita">
        <div id="contadorMovimentos">
          <div id="rotuloContador">Movimentos</div>
          <div id="valorMovimentos">0</div>
        </div>
        <div id="instrucoes">
          <span>MOUSE</span> — orbitar câmera<br />
          <span>SCROLL</span> — zoom<br />
          <span>u / f / r / d / b / l</span> — girar faces horário<br />
          <span>U / F / R / D / B / L</span> — girar faces anti-horário<br />
          <span>SPACE</span> — embaralhar
        </div>
      </div>
    </div>

    <div id="telaVitoria">
      <img src="icons/autobots-icon.png" alt="Autobots Logo" id="iconeVitoria" />
      
      <div id="mensagemVitoria">VITÓRIA!</div>
      
      <div id="detalhesVitoria">
        Parabéns! Você resolveu o cubo mágico!<br>
        <span style="color: #e8a020;">Autobots, transformação completa!</span>
      </div>
      
      <div id="botoesVitoria">
        <button class="botao" onclick="novoJogo()">Novo Jogo</button>
        <button class="botao" onclick="fecharVitoria()">Continuar</button>
      </div>
    </div>

    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );

      camera.position.set(6, 5, 10);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 4;
      controls.maxDistance = 30;

      function criarEstrelas() {
        const qtd = 1000;
        const posicoes = new Float32Array(qtd * 3);

        for (let i = 0; i < qtd; i++) {
          posicoes[i * 3] = (Math.random() - 0.5) * 300;
          posicoes[i * 3 + 1] = (Math.random() - 0.5) * 300;
          posicoes[i * 3 + 2] = (Math.random() - 0.5) * 300;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(posicoes, 3));
        const mat = new THREE.PointsMaterial({
          color: 0xffffff,
          size: 0.15,
          sizeAttenuation: true,
        });
        const estrelas = new THREE.Points(geo, mat);
        scene.add(estrelas);
        return estrelas;
      }

      const estrelas = criarEstrelas();
      renderer.setClearColor(0x000008);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const CORES = {
        DIREITA: new THREE.MeshLambertMaterial({ color: 0xff6000 }),
        ESQUERDA: new THREE.MeshLambertMaterial({ color: 0xcc0000 }),
        CIMA: new THREE.MeshLambertMaterial({ color: 0xffffff }),
        BAIXO: new THREE.MeshLambertMaterial({ color: 0xffee00 }),
        FRENTE: new THREE.MeshLambertMaterial({ color: 0x009b48 }),
        ATRAS: new THREE.MeshLambertMaterial({ color: 0x0046ad }),
        INTERNO: new THREE.MeshLambertMaterial({ color: 0x1a1a1a }),
      };

      const CORES_HEX = {
        DIREITA: 0xff6000,
        ESQUERDA: 0xcc0000,
        CIMA: 0xffffff,
        BAIXO: 0xffee00,
        FRENTE: 0x009b48,
        ATRAS: 0x0046ad,
      };

      const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(luzAmbiente);
      const luzDirecional = new THREE.DirectionalLight(0xffffff, 0.8);
      luzDirecional.position.set(10, 15, 10);
      scene.add(luzDirecional);

      function criarCubinho(x, y, z) {
        const materiais = [
          x === 1 ? CORES.DIREITA : CORES.INTERNO,
          x === -1 ? CORES.ESQUERDA : CORES.INTERNO,
          y === 1 ? CORES.CIMA : CORES.INTERNO,
          y === -1 ? CORES.BAIXO : CORES.INTERNO,
          z === 1 ? CORES.FRENTE : CORES.INTERNO,
          z === -1 ? CORES.ATRAS : CORES.INTERNO,
        ];
        const geo = new THREE.BoxGeometry(0.98, 0.98, 0.98);
        const mesh = new THREE.Mesh(geo, materiais);
        mesh.position.set(x, y, z);
        const arestas = new THREE.LineSegments(
          new THREE.EdgesGeometry(geo),
          new THREE.LineBasicMaterial({ color: 0x000000 }),
        );
        mesh.add(arestas);

        scene.add(mesh);
        return mesh;
      }

      const cubinhos = [];

      for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
          for (let z = -1; z <= 1; z++) {
            const cubinho = criarCubinho(x, y, z);
            cubinhos.push(cubinho);
          }
        }
      }

      const CONFIG_FACES = {
        u: {
          eixoFiltro: "y",
          direcaoFiltro: "positivo",
          eixoRotacao: "y",
          sinalRotacao: -1,
        },
        f: {
          eixoFiltro: "z",
          direcaoFiltro: "positivo",
          eixoRotacao: "z",
          sinalRotacao: -1,
        },
        r: {
          eixoFiltro: "x",
          direcaoFiltro: "positivo",
          eixoRotacao: "x",
          sinalRotacao: -1,
        },
        d: {
          eixoFiltro: "y",
          direcaoFiltro: "negativo",
          eixoRotacao: "y",
          sinalRotacao: -1,
        },
        b: {
          eixoFiltro: "z",
          direcaoFiltro: "negativo",
          eixoRotacao: "z",
          sinalRotacao: -1,
        },
        l: {
          eixoFiltro: "x",
          direcaoFiltro: "negativo",
          eixoRotacao: "x",
          sinalRotacao: -1,
        },
        U: {
          eixoFiltro: "y",
          direcaoFiltro: "positivo",
          eixoRotacao: "y",
          sinalRotacao: 1,
        },
        F: {
          eixoFiltro: "z",
          direcaoFiltro: "positivo",
          eixoRotacao: "z",
          sinalRotacao: 1,
        },
        R: {
          eixoFiltro: "x",
          direcaoFiltro: "positivo",
          eixoRotacao: "x",
          sinalRotacao: 1,
        },
        D: {
          eixoFiltro: "y",
          direcaoFiltro: "negativo",
          eixoRotacao: "y",
          sinalRotacao: 1,
        },
        B: {
          eixoFiltro: "z",
          direcaoFiltro: "negativo",
          eixoRotacao: "z",
          sinalRotacao: 1,
        },
        L: {
          eixoFiltro: "x",
          direcaoFiltro: "negativo",
          eixoRotacao: "x",
          sinalRotacao: 1,
        },
      };

      function obterCubinhosDaFace(config) {
        return cubinhos.filter((cubo) => {
          const valorPosicao = cubo.position[config.eixoFiltro];
          if (config.direcaoFiltro === "positivo") {
            return valorPosicao > 0.9;
          } else {
            return valorPosicao < -0.9;
          }
        });
      }

      const totalDeFrames = 30;
      const fatiaDoAngulo = Math.PI / 2 / totalDeFrames;
      let estaGirando = false;
      let grupoMovel = null;
      let contadorMovimentos = 0;
      const elementoContador = document.getElementById("valorMovimentos");

      function atualizarContador() {
        elementoContador.textContent = contadorMovimentos.toString();
      }

      function resetarContador() {
        contadorMovimentos = 0;
        atualizarContador();
      }

      function girarFace(tecla, quandoTerminar, registrarMovimento = true) {
        if (!CONFIG_FACES[tecla]) return false;
        if (estaGirando) return false;

        estaGirando = true;
        let frameAtual = 0;
        const configAtual = CONFIG_FACES[tecla];

        const meus9Cubinhos = obterCubinhosDaFace(configAtual);

        grupoMovel = new THREE.Group();
        scene.add(grupoMovel);
        meus9Cubinhos.forEach((cubo) => grupoMovel.attach(cubo));

        function animarGiro() {
          grupoMovel.rotation[configAtual.eixoRotacao] +=
            fatiaDoAngulo * configAtual.sinalRotacao;
          frameAtual++;

          if (frameAtual < totalDeFrames) {
            requestAnimationFrame(animarGiro);
          } else {
            grupoMovel.rotation[configAtual.eixoRotacao] =
              (Math.PI / 2) * configAtual.sinalRotacao;
            finalizarGiro();
          }
        }        

        function finalizarGiro() {
          [...grupoMovel.children].forEach((cubo) => {
            scene.attach(cubo);
            cubo.position.x = Math.round(cubo.position.x);
            cubo.position.y = Math.round(cubo.position.y);
            cubo.position.z = Math.round(cubo.position.z);
          });
          scene.remove(grupoMovel);
          grupoMovel = null;
          estaGirando = false;

          if (registrarMovimento) {
            contadorMovimentos += 1;
            atualizarContador();
          }

          if (verificarVitoria()) {
            exibirVitoria();
          }

          if(quandoTerminar){
            quandoTerminar();
          }
          
        }
        animarGiro();
      }
      let estaEmbaralhando = false;
      function embaralhar(){
        if(estaGirando || estaEmbaralhando) return;

        resetarContador();
        estaEmbaralhando = true;

        const movimentosPossiveis = ["u", "f", "r", "d", "b", "l", "U", "F", "R", "D", "B", "L"];
        const quantidadeDeMovimentos = 20;
        const sequencia = [];

        for(let i = 0; i < quantidadeDeMovimentos; i++){
          const indiceAleatorio = Math.floor(Math.random()*movimentosPossiveis.length);
          const movimento = movimentosPossiveis[indiceAleatorio];

          sequencia.push(movimento);
        }
        
        function executarProximoMovimento(indice){
          if(indice >= sequencia.length){
            estaEmbaralhando = false;
            return;
          }

          const movimentoAtual = sequencia[indice];

          girarFace(movimentoAtual, ()=>{
            executarProximoMovimento(indice + 1);
          }, false)
        }

        executarProximoMovimento(0);

      }

      function obterCorDaMaterial(material) {
        if (!material || !material.color) return null;
        return material.color.getHex();
      }

      function verificarFaceCompleta(posicoes, eixo, valor, indiceCorEsperada) {
        const corEsperada = Object.values(CORES_HEX)[indiceCorEsperada];
        const cubinhosDaFace = cubinhos.filter(cubo => {
          if (eixo === "x") return Math.abs(cubo.position.x - valor) < 0.5;
          if (eixo === "y") return Math.abs(cubo.position.y - valor) < 0.5;
          if (eixo === "z") return Math.abs(cubo.position.z - valor) < 0.5;
        });

        if (cubinhosDaFace.length !== 9) return false;

        return cubinhosDaFace.every(cubo => {
          const materiais = cubo.material || [];
          const materiaisList = Array.isArray(materiais) ? materiais : [materiais];
          
          for (let material of materiaisList) {
            const cor = obterCorDaMaterial(material);
            if (cor === corEsperada) return true;
          }
          return false;
        });
      }

      function verificarVitoria() {
        const faces = [
          { eixo: "x", valor: 1, corEsperada: "DIREITA" },
          { eixo: "x", valor: -1, corEsperada: "ESQUERDA" },
          { eixo: "y", valor: 1, corEsperada: "CIMA" },
          { eixo: "y", valor: -1, corEsperada: "BAIXO" },
          { eixo: "z", valor: 1, corEsperada: "FRENTE" },
          { eixo: "z", valor: -1, corEsperada: "ATRAS" },
        ];

        for (let face of faces) {
          const corEsperada = CORES_HEX[face.corEsperada];
          const cubinhosDaFace = cubinhos.filter(cubo => {
            if (face.eixo === "x") return Math.abs(cubo.position.x - face.valor) < 0.5;
            if (face.eixo === "y") return Math.abs(cubo.position.y - face.valor) < 0.5;
            if (face.eixo === "z") return Math.abs(cubo.position.z - face.valor) < 0.5;
          });

          if (cubinhosDaFace.length !== 9) return false;

          const todasAsMesmasCores = cubinhosDaFace.every(cubo => {
            const materiais = Array.isArray(cubo.material) ? cubo.material : [cubo.material];
            return materiais.some(mat => obterCorDaMaterial(mat) === corEsperada);
          });

          if (!todasAsMesmasCores) return false;
        }

        return true;
      }

      function exibirVitoria() {
        const telaVitoria = document.getElementById("telaVitoria");
        telaVitoria.classList.add("ativa");
      }

      function fecharVitoria() {
        const telaVitoria = document.getElementById("telaVitoria");
        telaVitoria.classList.remove("ativa");
      }

      function novoJogo() {
        fecharVitoria();
        embaralhar();
      }

      resetarContador();

      window.addEventListener("keydown", (event) => {
        if(estaGirando) return;

        const tecla = event.key;

        if(tecla == " "){
          embaralhar();
          return;
        }

        girarFace(tecla);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        estrelas.rotation.y += 0.00015;
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
