<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autobots Rubik — Transformers Cube</title>

    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/js/controls/OrbitControls.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <div id="hud">
      <div>
        <div id="titulo">Autobots Rubik</div>
        <div id="subtitulo">TRANSFORMERS EDITION — THREE.JS</div>
      </div>
      <div id="instrucoes">
        <span>MOUSE</span> — orbitar câmera<br />
        <span>SCROLL</span> — zoom<br />
        <span>U / F / R</span> — girar faces<br />
        <span>SPACE</span> — embaralhar
      </div>
    </div>

    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );

      camera.position.set(6, 5, 10);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({antialias: true});
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);




    </script>







  </body>





  </html>
