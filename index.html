<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autobots Rubik — Transformers Cube</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000000;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px 28px;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        z-index: 10;
      }
      #titulo {
        color: #e8a020;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow:
          0 0 18px #e8a02088,
          0 0 40px #e8a02044;
      }
      #subtitulo {
        color: #4fc3f7;
        font-size: 11px;
        letter-spacing: 2px;
        margin-top: 4px;
        opacity: 0.8;
      }
      #instrucoes {
        color: #aaa;
        font-size: 11px;
        text-align: right;
        line-height: 1.9;
        letter-spacing: 1px;
      }
      #instrucoes span {
        color: #e8a020;
      }
      #hud::after {
        content: "";
        position: fixed;
        bottom: 20px;
        left: 28px;
        width: 120px;
        height: 2px;
        background: linear-gradient(90deg, #e8a020, transparent);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
  </head>

  <body>
    <div id="hud">
      <div>
        <div id="titulo">Autobots Rubik</div>
        <div id="subtitulo">TRANSFORMERS EDITION — THREE.JS</div>
      </div>
      <div id="instrucoes">
        <span>MOUSE</span> — orbitar câmera<br />
        <span>SCROLL</span> — zoom<br />
        <span>U / F / R</span> — girar faces<br />
        <span>SPACE</span> — embaralhar
      </div>
    </div>

    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );

      camera.position.set(6, 5, 10);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 4;
      controls.maxDistance = 30;

      function criarEstrelas() {
        const qtd = 1000;
        const posicoes = new Float32Array(qtd * 3);

        for (let i = 0; i < qtd; i++) {
          posicoes[i * 3] = (Math.random() - 0.5) * 300;
          posicoes[i * 3 + 1] = (Math.random() - 0.5) * 300;
          posicoes[i * 3 + 2] = (Math.random() - 0.5) * 300;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(posicoes, 3));
        const mat = new THREE.PointsMaterial({
          color: 0xffffff,
          size: 0.15,
          sizeAttenuation: true,
        });
        const estrelas = new THREE.Points(geo, mat);
        scene.add(estrelas);
        return estrelas;
      }

      const estrelas = criarEstrelas();
      renderer.setClearColor(0x000008);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const CORES = {
        DIREITA: new THREE.MeshLambertMaterial({ color: 0xff6000 }),
        ESQUERDA: new THREE.MeshLambertMaterial({ color: 0xcc0000 }),
        CIMA: new THREE.MeshLambertMaterial({ color: 0xffffff }),
        BAIXO: new THREE.MeshLambertMaterial({ color: 0xffee00 }),
        FRENTE: new THREE.MeshLambertMaterial({ color: 0x009b48 }),
        ATRAS: new THREE.MeshLambertMaterial({ color: 0x0046ad }),
        INTERNO: new THREE.MeshLambertMaterial({ color: 0x1a1a1a }),
      };

      const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(luzAmbiente);
      const luzDirecional = new THREE.DirectionalLight(0xffffff, 0.8);
      luzDirecional.position.set(10, 15, 10);
      scene.add(luzDirecional);

      function criarCubinho(x, y, z) {
        const materiais = [
          x === 1 ? CORES.DIREITA : CORES.INTERNO,
          x === -1 ? CORES.ESQUERDA : CORES.INTERNO,
          y === 1 ? CORES.CIMA : CORES.INTERNO,
          y === -1 ? CORES.BAIXO : CORES.INTERNO,
          z === 1 ? CORES.FRENTE : CORES.INTERNO,
          z === -1 ? CORES.ATRAS : CORES.INTERNO,
        ];
        const geo = new THREE.BoxGeometry(0.98, 0.98, 0.98);
        const mesh = new THREE.Mesh(geo, materiais);
        mesh.position.set(x, y, z);
        const arestas = new THREE.LineSegments(
          new THREE.EdgesGeometry(geo),
          new THREE.LineBasicMaterial({ color: 0x000000 }),
        );
        mesh.add(arestas);

        scene.add(mesh);
        return mesh;
      }

      const cubinhos = [];

      for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
          for (let z = -1; z <= 1; z++) {
            const cubinho = criarCubinho(x, y, z);
            cubinhos.push(cubinho);
          }
        }
      }

      console.log("Cubinhos criados:", cubinhos.length);

      // pra filtrar os 9 cubos de cima
      function obterCubinhosDaFaceSuperior() {
        const faceSuperior = cubinhos.filter(cubo => {
          return cubo.position.y > 0.9;
        });
        return faceSuperior; //os 9
      }

      // pra filtrar os cubinhos e criar o grupo
      let estaGirando = false;
      window.addEventListener("keydown", (event) => {
      
        if (event.key.toLowerCase() === "u") {

          if (estaGirando) return; 
          estaGirando = true;

          const meus9Cubinhos = obterCubinhosDaFaceSuperior();

          console.log("Cubinhos detectados no topo:", meus9Cubinhos.length);
          console.log("Lista de objetos:", meus9Cubinhos);
          
          const grupoMovel = new THREE.Group();
          scene.add(grupoMovel);
          meus9Cubinhos.forEach(cubo => {
            grupoMovel.attach(cubo);
          });

          //tentando rotacionar lentinho
          let frameAtual = 0;
          const totalDeFrames = 30; // quanto mais frames, mais devagar
          const fatiaDoAngulo = (Math.PI / 2) / totalDeFrames; 

          function animarGiro() {

            grupoMovel.rotation.y -= fatiaDoAngulo;
            frameAtual++;
  
        
            if (frameAtual < totalDeFrames) {
              requestAnimationFrame(animarGiro);
            } else {
              grupoMovel.rotation.y = -Math.PI / 2;
              finalizarGiro(); 
            }
          }

          function finalizarGiro() {
  
            const filhosDoGrupo = [...grupoMovel.children];

            filhosDoGrupo.forEach(cubo => {
            // 1. Devolve pra cena global
              scene.attach(cubo);
              cubo.position.x = Math.round(cubo.position.x);
              cubo.position.y = Math.round(cubo.position.y);
              cubo.position.z = Math.round(cubo.position.z);
            });
            scene.remove(grupoMovel);
            estaGirando = false;
          }

          animarGiro();
          
        }
      });




      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        estrelas.rotation.y += 0.00015;
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
