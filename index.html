<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autobots Rubik — Transformers Cube</title>

    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/js/controls/OrbitControls.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px 28px;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        z-index: 10;
      }
      #titulo {
        color: #e8a020;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow:
          0 0 18px #e8a02088,
          0 0 40px #e8a02044;
      }

      #subtitulo {
        color: #4fc3f7;
        font-size: 11px;
        letter-spacing: 2px;
        margin-top: 4px;
        opacity: 0.8;
      }

      #instrucoes {
        color: #aaa;
        font-size: 11px;
        text-align: right;
        line-height: 1.9;
        letter-spacing: 1px;
      }
      #instrucoes span {
        color: #e8a020;
      }
      #hud::after {
        content: "";
        position: fixed;
        bottom: 20px;
        left: 28px;
        width: 120px;
        height: 2px;
        background: linear-gradient(90deg, #e8a020, transparent);
      }
    </style>
  </head>

  <body>
    <div id="hud">
      <div>
        <div id="titulo">Autobots Rubik</div>
        <div id="subtitulo">TRANSFORMERS EDITION — THREE.JS</div>
      </div>
      <div id="instrucoes">
        <span>MOUSE</span> — orbitar câmera<br />
        <span>SCROLL</span> — zoom<br />
        <span>U / F / R</span> — girar faces<br />
        <span>SPACE</span> — embaralhar
      </div>
    </div>

    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );

      camera.position.set(6, 5, 10);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 4;
      controls.maxDistance = 30;

      function criarEstrelas() {
        const qtd = 1000;
        const posicoes = new Float32Array(qtd * 3);

        for (let i = 0; i < qtd; i++) {
          posicoes[i * 3] = (Math.random() - 0.5) * 300;
          posicoes[i * 3 + 1] = (Math.random() - 0.5) * 300;
          posicoes[i * 3 + 2] = (Math.random() - 0.5) * 300;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(posicoes, 3));
        const mat = new THREE.PointsMaterial({
          color: 0xffffff,
          size: 0.15,
          sizeAttenuation: true,
        });

        const estrelas = new THREE.Points(geo, mat);
        scene.add(estrelas);
        return estrelas;
      }

      const estrelas = criarEstrelas();
      renderer.setClearColor(0x000008);

      const geoPlaceholder = new THREE.BoxGeometry(3, 3, 3);
      const matPlaceholder = new THREE.MeshNormalMaterial({ wireframe: false });
      const cubePlaceholder = new THREE.Mesh(geoPlaceholder, matPlaceholder);
      scene.add(cubePlaceholder);

      const arestas = new THREE.LineSegments(
        new THREE.EdgesGeometry(geoPlaceholder),
        new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }),
      );
      cubePlaceholder.add(arestas);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        cubePlaceholder.rotation.y += 0.004;
        estrelas.rotation.y += 0.00015;
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
